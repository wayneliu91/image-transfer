name: Sync Image to GHCR

on:
  workflow_dispatch: # 允许你手动点击按钮触发同步

jobs:
  push-to-ghcr:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 自动获取免密授权

      - name: Pull and Push Progress
        run: |
          # 1. 从 Docker Hub 拉取 Collabora 镜像
          docker pull collabora/code:25.04.9.4.1
          
          # 2. 修改标签为你的 GitHub 镜像仓库地址 (注意转换为小写)
          IMAGE_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker tag collabora/code:25.04.9.4.1 ghcr.io/$IMAGE_OWNER/collabora-code:25.04.9.4.1
          
          # 3. 推送到 GitHub 镜像仓库
          docker push ghcr.io/$IMAGE_OWNER/collabora-code:25.04.9.4.1
